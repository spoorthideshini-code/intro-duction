<!DOCTYPE html>
<html>
<head>
    <title>Favourite Things Page</title>

    <style>
        body {
            background-color: #f5f7fa;
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #333;
        }

        h1 {
            color: #ff4d6d;
            text-align: center;
            background-color: #ffe5ec;
            padding: 15px;
            border-radius: 10px;
        }

        h2 {
            color: #6a4c93;
            margin-top: 30px;
        }

        p {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            line-height: 1.6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        ol, ul {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        li {
            margin: 8px 0;
        }

        mark {
            background-color: yellow;
            padding: 2px 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h1>My Favourite Things</h1>

    <p>
        <b>Welcome</b> to my favourite things page.<br>
        I like <i>music</i>, <u>travelling</u>, and <mark>telling stories</mark>.
    </p>

    <h2>My Favourite Movies</h2>
    <ol>
        <li>Fidaa</li>
        <li>Karthikeya 2</li>
        <li>Godavari</li>
    </ol>

    <h2>My Hobbies</h2>
    <ul>
        <li>Listening to music</li>
        <li>Watching dramas</li>
        <li>Telling stories</li>
    </ul>

</body>
</html>
