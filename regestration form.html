<!DOCTYPE html>
<html>
<head>
    <title>College Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2 class="main-title">College Registration Form</h2>

        <form class="form">

            <label>Full Name:</label><br>
            <input type="text" placeholder="Enter your name"><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email"><br><br>

            <label>Password:</label><br>
            <input type="password" placeholder="Enter password"><br><br>

            <label>Gender:</label><br>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
            <br><br>

            <label>Courses Interested:</label><br>
            <input type="checkbox"> CSE
            <input type="checkbox"> ECE
            <input type="checkbox"> MECH
            <input type="checkbox"> CIVIL
            <br><br>

            <label>Select Year:</label><br>
            <select>
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
                <option>4th Year</option>
            </select>
            <br><br>

            <label>Address:</label><br>
            <textarea rows="4" cols="30" placeholder="Enter your address"></textarea>
            <br><br>

            <div class="form-actions">
                <button type="submit" class="btn">Register</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>

        </form>
    </div>

</body>
</html>
